# Cloudflare Workers + Assets — XPElevator
# Docs: https://developers.cloudflare.com/workers/static-assets/

name = "xpelevator"
main = ".open-next/worker.js"
compatibility_date = "2025-01-01"

# nodejs_compat is required for Neon serverless driver
compatibility_flags = ["nodejs_compat"]

# Static assets served by the Worker
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ── Environment variables ────────────────────────────────────────────────────
# Set via `wrangler secret put DATABASE_URL` / `wrangler secret put GROQ_API_KEY`
# or in the Cloudflare Workers dashboard (Settings → Variables & Secrets)
#
# Do NOT hard-code secrets here. The keys below are placeholders for reference only.
#
# [vars]
# DATABASE_URL = "postgresql://..."   # Neon connection string
# GROQ_API_KEY = "gsk_..."            # Groq API key
