name: Phase 1 — verify cutover (new build serving branded domain)

# Decisive follow-up to the DNS flip: proves xpelevator.com is serving the NEW
# LWT build (xpelevator-sim), not the old deployment. /api/health returns 200 on
# both builds, so this waits for the Pages custom-domain to go active and then
# compares the Next.js buildId of xpelevator.com against xpelevator-sim.pages.dev
# (equality = same build = cutover took effect).
#
# Runs on the Actions runner (sandbox is egress-blocked from the branded domain +
# CF API). Uses the repo-staged CF_API_TOKEN / CF_ACCOUNT_ID. Touches no DNS.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase1-verify-cutover.yml'
      - 'scripts/verify-cutover.mjs'

concurrency:
  group: phase1-verify-cutover
  cancel-in-progress: false

jobs:
  verify:
    name: Confirm branded domain serves the new build
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_PROJECT: xpelevator-sim
      APEX: xpelevator.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Poll domain status + build-fingerprint compare
        run: node scripts/verify-cutover.mjs
