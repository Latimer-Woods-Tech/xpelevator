name: Phase 2 (2/3) — tenant-isolation canary

# Proves the session-scoped IDOR is closed on the LIVE LWT deploy: a stranger
# (authenticated, but not the owner) is denied on GET/POST /api/chat and
# /api/scoring for another user's session, while the owner still reads their own.
#
# Touches NO DNS and writes only two *.internal test users. Uses the repo-staged
# secrets. Manual/re-runnable canary — the automatic per-deploy gate lives in
# deploy.yml (runs after the fresh build is live, so it never races the deploy).
on:
  workflow_dispatch:

concurrency:
  group: phase2-verify
  cancel-in-progress: false

jobs:
  tenant-isolation:
    name: Cross-tenant session access must be denied
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://xpelevator-sim.pages.dev
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Assert a stranger cannot reach another user's session
        run: node scripts/phase2-tenant-isolation.mjs
