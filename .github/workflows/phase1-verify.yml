name: Phase 1(c/d) — migrate live DB + scoring canary

# Phase 1(c): back up the live Neon DB (aged-butterfly-52244878), baseline any
#   already-present-but-unrecorded non-idempotent migrations, then
#   `prisma migrate deploy`.
# Phase 1(d): drive one full authenticated chat session against the live LWT
#   deploy and assert a NON-NULL score (the Phase-1 acceptance + scoring canary).
#
# Touches NO DNS. Uses the repo-staged secrets. Triggered manually, and once
# automatically on the PR merge (paths filter matches the files it adds) so the
# slice self-verifies without needing actions:write to dispatch.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase1-verify.yml'
      - 'scripts/phase1-canary.mjs'
      - 'scripts/db-backup-and-guard.mjs'

concurrency:
  group: phase1-verify
  cancel-in-progress: false

jobs:
  migrate:
    name: Backup + migrate live Neon DB
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Backup DB + build migration baseline plan (dry-run evidence)
        run: node scripts/db-backup-and-guard.mjs

      - name: Upload DB backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ github.run_id }}
          path: backup/
          retention-days: 30

      - name: Compute direct (non-pooled) URL for migrations
        run: |
          # Prisma migrate needs a direct connection (advisory locks / DDL);
          # Neon's -pooler endpoint (PgBouncer txn mode) breaks that. Strip it.
          DIRECT="$(printf '%s' "$DATABASE_URL" | sed 's/-pooler//g')"
          echo "::add-mask::$DIRECT"
          echo "DIRECT_DATABASE_URL=$DIRECT" >> "$GITHUB_ENV"

      - name: Migrate status BEFORE (dry-run)
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate status || true

      - name: Baseline already-present, unrecorded migrations
        run: |
          if [ -s baseline.txt ]; then
            while IFS= read -r m; do
              [ -z "$m" ] && continue
              echo "Baselining $m as applied (resolve --applied)"
              DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate resolve --applied "$m"
            done < baseline.txt
          else
            echo "No migrations to baseline."
          fi

      - name: prisma migrate deploy
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate deploy

      - name: Migrate status AFTER (must be up to date)
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate status

  canary:
    name: End-to-end scoring canary (non-null score)
    needs: migrate
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://xpelevator-sim.pages.dev
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Drive a full session and assert a non-null score
        run: node scripts/phase1-canary.mjs
