name: Phase 1 — DNS cutover (founder-gated, B2 pre-authorized)

# Flips xpelevator.com + www onto the LWT Pages project (xpelevator-sim), the
# final Phase-1 step. Founder authorization: issue #16 comment B2 (2026-07-05) —
# "conditional pre-authorization stands (flip only after posted evidence:
# preview health 200 + non-null score)"; that evidence was posted in PR #22.
#
# Runs on the Actions runner (the sandbox is egress-blocked from the CF API /
# DNS). Uses the repo-staged CF_API_TOKEN / CF_ACCOUNT_ID. The script is
# discovery-first: it ASSERTS the zone is LWT-owned and the project exists
# before any mutation, snapshots rollback state, then verifies the cutover with
# curl (/api/health 200 on apex + www) as the real proof.
#
# Trigger: manual dispatch, and once automatically on merge (paths filter) so
# the slice self-executes without needing actions:write to dispatch — the same
# mechanism Phase 1(b)/(c/d) used.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/phase1-dns-flip.yml'
      - 'scripts/dns-flip.mjs'

concurrency:
  group: phase1-dns-flip
  cancel-in-progress: false

jobs:
  flip:
    name: Flip xpelevator.com onto xpelevator-sim (verify with curl)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_PROJECT: xpelevator-sim
      APEX: xpelevator.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Execute DNS cutover + verify
        run: node scripts/dns-flip.mjs
