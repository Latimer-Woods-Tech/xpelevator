name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast static gates — no build, no DB. Every PR must pass typecheck + lint.
  quality:
    name: Quality (typecheck + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint, zero errors)
        run: npm run lint

  # Deterministic unit tests — no DB, no live LLM/Telnyx creds (all mocked).
  # Job name kept stable as a required status check.
  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest run tests/unit)
        run: npm run test:unit

  # Deterministic ui tier — React component render in happy-dom. All deps mocked
  # (auth/next-auth/next-navigation/fetch), no DB/LLM/Telnyx creds, can't flake.
  ui-tests:
    name: UI tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: UI component tests (vitest run tests/ui)
        run: npm run test:ui

  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      # Dummy values — build does not connect to DB at build time.
      # Real secrets must be set in Cloudflare Pages environment variables.
      DATABASE_URL: postgresql://user:pass@localhost/db
      GROQ_API_KEY: dummy-key-for-build
      AUTH_SECRET: dummy-secret-for-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # NOTE: the DETERMINISTIC tiers — unit (tests/unit, 73 tests) and ui
  # (tests/ui, 21 tests, React render in happy-dom) — are wired as required
  # gates above. All deps are mocked (auth/next-auth/next-navigation/fetch), so
  # neither needs DB/LLM/Telnyx creds and neither can flake on credentials.
  # The integration/smoke tiers still hit live Neon + Groq (tests/setup.ts loads
  # real .env) and carry residual drift, so they are NOT gated yet — wiring a
  # credential-dependent or red suite as a required check would flake/block every
  # PR. Making the integration/smoke tiers deterministic + adding the §3-4
  # coverage floors is the next Phase 3 sub-slice tracked in issue #16.
