name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast static gates — no build, no DB. Every PR must pass typecheck + lint.
  quality:
    name: Quality (typecheck + lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (eslint, zero errors)
        run: npm run lint

  # Deterministic unit tests — no DB, no live LLM/Telnyx creds (all mocked).
  # Every PR must pass. Integration/UI tests are NOT yet wired (see NOTE below).
  unit-tests:
    name: Unit tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (vitest run tests/unit)
        run: npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      # Dummy values — build does not connect to DB at build time.
      # Real secrets must be set in Cloudflare Pages environment variables.
      DATABASE_URL: postgresql://user:pass@localhost/db
      GROQ_API_KEY: dummy-key-for-build
      AUTH_SECRET: dummy-secret-for-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # NOTE: only the DETERMINISTIC unit suite (tests/unit — 73 tests, all deps
  # mocked, no DB/LLM/Telnyx creds) is wired as a required gate above. The
  # integration/ui/smoke tiers still hit live Neon + Groq (tests/setup.ts loads
  # real .env) and carry residual drift, so they are NOT gated yet — wiring a
  # credential-dependent or red suite as a required check would flake/block every
  # PR. Repairing the integration/ui tiers + adding the §3-4 coverage floors is
  # the next Phase 3 sub-slice tracked in issue #16.
