name: Deploy to Cloudflare Pages (LWT)

# Phase 1(b): build via OpenNext and deploy a NEW Cloudflare Pages project in the
# LWT account, then verify on the *.pages.dev preview URL BEFORE any DNS cutover.
#
# - Auth uses the repo-staged CF_API_TOKEN / CF_ACCOUNT_ID (mapped onto the
#   CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID env vars wrangler reads).
# - Deploys to a fresh project name (xpelevator-sim) — the old xpelevator.pages.dev
#   lives in a different CF account and its subdomain is globally reserved.
# - The xpelevator.com CNAME flip is founder-gated and is NOT part of this workflow.
# - Runs on push to main (steady state) and manual dispatch. The job
#   self-verifies (/api/health 200 + live Groq credential) and fails loudly on a
#   bad deploy; it touches NO DNS, so auto-run on merge is safe.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-lwt
  cancel-in-progress: false

env:
  CF_PROJECT: xpelevator-sim
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  # Apply any pending Prisma migrations to the live Neon DB BEFORE the new worker
  # is deployed. `deploy` needs this, so code that reads a new column can never go
  # live ahead of the column existing (the migrate-vs-deploy race). Backs up first
  # (org schema standard, PLATFORM_STANDARDS §6) and is a no-op when up to date.
  migrate:
    runs-on: ubuntu-latest
    name: Backup + migrate live Neon DB
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci

      - name: Backup DB + build migration baseline plan (dry-run evidence)
        run: node scripts/db-backup-and-guard.mjs

      - name: Upload DB backup artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ github.run_id }}
          path: backup/
          retention-days: 30

      - name: Compute direct (non-pooled) URL for migrations
        run: |
          # Prisma migrate needs a direct connection (advisory locks / DDL);
          # Neon's -pooler endpoint (PgBouncer txn mode) breaks that. Strip it.
          DIRECT="$(printf '%s' "$DATABASE_URL" | sed 's/-pooler//g')"
          echo "::add-mask::$DIRECT"
          echo "DIRECT_DATABASE_URL=$DIRECT" >> "$GITHUB_ENV"

      - name: Migrate status BEFORE (dry-run)
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate status || true

      - name: Baseline already-present, unrecorded migrations
        run: |
          if [ -s baseline.txt ]; then
            while IFS= read -r m; do
              [ -z "$m" ] && continue
              echo "Baselining $m as applied (resolve --applied)"
              DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate resolve --applied "$m"
            done < baseline.txt
          else
            echo "No migrations to baseline."
          fi

      - name: prisma migrate deploy
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate deploy

      - name: Migrate status AFTER (must be up to date)
        run: DATABASE_URL="$DIRECT_DATABASE_URL" npx prisma migrate status

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    name: Build, deploy to LWT, verify

    env:
      # Injected at build time so src/lib/env.ts validation passes during the
      # OpenNext build. At RUNTIME the Pages Worker reads these from the
      # project secrets set below (surfaced into process.env by OpenNext).
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx @opennextjs/cloudflare build

      - name: Bundle worker for Pages advanced mode
        run: node scripts/bundle-worker.js

      - name: Ensure Pages project exists (idempotent)
        run: |
          npx wrangler pages project create "$CF_PROJECT" \
            --production-branch=main \
            || echo "Project already exists — continuing."

      - name: Set Pages project secrets
        # printf '%s' (NOT echo) avoids the trailing-newline trap on secret values.
        run: |
          printf '%s' "$GROQ_API_KEY"  | npx wrangler pages secret put GROQ_API_KEY  --project-name="$CF_PROJECT"
          printf '%s' "$DATABASE_URL"  | npx wrangler pages secret put DATABASE_URL  --project-name="$CF_PROJECT"
          printf '%s' "$AUTH_SECRET"   | npx wrangler pages secret put AUTH_SECRET   --project-name="$CF_PROJECT"

      - name: Deploy to Cloudflare Pages (production branch)
        run: |
          npx wrangler pages deploy .open-next/assets \
            --project-name="$CF_PROJECT" \
            --branch=main

      - name: Verify /api/health on the pages.dev alias
        run: |
          set -e
          BASE="https://${CF_PROJECT}.pages.dev"
          echo "Verifying $BASE/api/health ..."
          code=000
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' "$BASE/api/health" || echo 000)
            echo "attempt $i: HTTP $code"
            cat /tmp/health.json 2>/dev/null || true; echo
            if [ "$code" = "200" ]; then break; fi
            sleep 10
          done
          if [ "$code" != "200" ]; then
            echo "::error::/api/health did not return 200 (last=$code)"
            exit 1
          fi
          echo "✅ /api/health returned 200"

      - name: Verify Groq scoring credential is live (not expired)
        run: |
          set -e
          code=$(curl -s -o /tmp/groq.json -w '%{http_code}' \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models || echo 000)
          echo "Groq /v1/models -> HTTP $code"
          head -c 400 /tmp/groq.json 2>/dev/null; echo
          if [ "$code" != "200" ]; then
            echo "::error::Groq credential rejected (HTTP $code) — scoring would be down"
            exit 1
          fi
          echo "✅ Groq credential valid — scoring engine credential is live"

      - name: Verify Phase 2 read-auth + no hidden-hint leak
        # The scoring mechanic depends on trainees NEVER seeing a scenario's
        # hidden hints/persona/objective. Assert on the freshly-deployed build:
        #   1. /api/scenarios, /api/jobs, /api/criteria reject anonymous reads (401)
        #   2. an anonymous /api/scenarios body exposes no hidden mechanics
        # Checked on the pages.dev alias (authoritative for this deploy) and on
        # the branded domain (proves live trainees are protected).
        run: |
          set -e
          fail=0
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            echo "== $BASE =="
            for path in /api/scenarios /api/jobs /api/criteria; do
              code=000
              for i in 1 2 3 4 5; do
                code=$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path" || echo 000)
                if [ "$code" = "401" ]; then break; fi
                sleep 6
              done
              echo "GET $path -> HTTP $code"
              if [ "$code" != "401" ]; then
                echo "::error::$BASE$path must require auth (got $code)"
                fail=1
              fi
            done
            # Hidden-hint leak guard on the anonymous scenarios payload.
            sc=$(curl -s "$BASE/api/scenarios" || echo '')
            if printf '%s' "$sc" | grep -Eiq '"hints"|customerObjective|customerPersona'; then
              echo "::error::$BASE/api/scenarios leaked hidden scenario mechanics"
              echo "  body (first 300 chars): $(printf '%s' "$sc" | head -c 300)"
              fail=1
            else
              echo "✅ $BASE/api/scenarios exposes no hidden mechanics to anonymous callers"
            fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Phase 2 security verification failed"
            exit 1
          fi
          echo "✅ Phase 2 read-auth + hidden-hint-leak checks passed"

      - name: Verify /api/plans is publicly reachable (anon 200)
        # The operator pricing/signup surface reads the seat-plan catalog from
        # /api/plans, which is public by design (no secrets, no tenant data).
        # The /api/* middleware matcher gates every API path, so this route must
        # be in PUBLIC_ROUTES or anonymous callers get 401 before the handler
        # runs. Permanent regression gate against that class of mismatch.
        run: |
          set -e
          fail=0
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            code=000
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /tmp/plans.json -w '%{http_code}' "$BASE/api/plans" || echo 000)
              if [ "$code" = "200" ]; then break; fi
              sleep 6
            done
            echo "GET $BASE/api/plans -> HTTP $code"
            if [ "$code" != "200" ]; then
              echo "::error::$BASE/api/plans must be public (got $code) — pricing/signup surface would break"
              fail=1
              continue
            fi
            # Public catalog must expose the tier shape but never internal wiring.
            if ! grep -q 'seat-based-subscription' /tmp/plans.json; then
              echo "::error::$BASE/api/plans body missing expected catalog shape"
              echo "  body (first 300 chars): $(head -c 300 /tmp/plans.json)"
              fail=1
            fi
            if grep -q 'stripeLookupKey' /tmp/plans.json; then
              echo "::error::$BASE/api/plans leaked internal stripeLookupKey wiring"
              fail=1
            fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::/api/plans public-reachability verification failed"
            exit 1
          fi
          echo "✅ /api/plans is publicly reachable and carries no internal wiring"

      - name: Verify /pricing operator surface is publicly reachable (anon 200)
        # The operator-facing pricing/signup surface (Phase 4) must render for
        # logged-out visitors — it is deliberately absent from the middleware
        # matcher (public like the home page). Permanent regression gate: anon
        # 200, the three seat-tier names present, and the org copy rule (the word
        # "AI" never appears on any user-facing surface).
        run: |
          set -e
          fail=0
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            code=000
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /tmp/pricing.html -w '%{http_code}' "$BASE/pricing" || echo 000)
              if [ "$code" = "200" ]; then break; fi
              sleep 6
            done
            echo "GET $BASE/pricing -> HTTP $code"
            if [ "$code" != "200" ]; then
              echo "::error::$BASE/pricing must be public (got $code) — operator pricing surface would 404"
              fail=1
              continue
            fi
            for tier in Chat Voice Phone; do
              if ! grep -q ">$tier<" /tmp/pricing.html; then
                echo "::error::$BASE/pricing missing seat tier '$tier'"
                fail=1
              fi
            done
            # Org copy rule: no standalone "AI" on a user-facing surface.
            if grep -Eq '\bAI\b' /tmp/pricing.html; then
              echo "::error::$BASE/pricing uses the banned word 'AI' (org copy rule)"
              fail=1
            fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::/pricing operator-surface verification failed"
            exit 1
          fi
          echo "✅ /pricing is publicly reachable, lists all seat tiers, and is copy-clean"

      - name: Verify manager reporting export is auth-gated (Phase 4)
        # The manager CSV export (GET /api/reports/sessions) returns a tenant's
        # completed-session scores — it is ADMIN-only and org-scoped, and must
        # NEVER be readable anonymously. The /api/* middleware matcher gates it,
        # and the handler additionally requires role=ADMIN. Permanent regression
        # gate: an anonymous caller must get 401 on both hosts (a 200 here would
        # mean the export leaked cross-tenant session data). Checked on the
        # pages.dev alias (authoritative for this deploy) and the branded domain.
        run: |
          set -e
          fail=0
          # Both the CSV (default) and PDF (?format=pdf) variants must reject anon.
          for PATH_Q in "/api/reports/sessions" "/api/reports/sessions?format=pdf"; do
            for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
              code=000
              for i in 1 2 3 4 5; do
                code=$(curl -s -o /dev/null -w '%{http_code}' "$BASE$PATH_Q" || echo 000)
                # 401 is the pass; anything else (esp. 200) is retried in case the
                # fresh deploy is still propagating, then failed below.
                if [ "$code" = "401" ]; then break; fi
                sleep 6
              done
              echo "GET $BASE$PATH_Q -> HTTP $code"
              if [ "$code" != "401" ]; then
                echo "::error::$BASE$PATH_Q must require auth (got $code) — manager export would leak session data"
                fail=1
              fi
            done
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Manager reporting export auth-gate verification failed"
            exit 1
          fi
          echo "✅ /api/reports/sessions (CSV + PDF) rejects anonymous callers (401) on both hosts"

      - name: Verify home page is copy-clean (org copy rule, Phase 4)
        # The public home page (`/`) previously described "AI-generated
        # performance scores". Phase 4 copy pass rewrote it to craft vocabulary
        # ("weighted performance scores"). Permanent regression gate: anon 200
        # and the banned word "AI" never appears in the served HTML.
        run: |
          set -e
          fail=0
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            code=000
            for i in 1 2 3 4 5; do
              code=$(curl -s -o /tmp/home.html -w '%{http_code}' "$BASE/" || echo 000)
              if [ "$code" = "200" ]; then break; fi
              sleep 6
            done
            echo "GET $BASE/ -> HTTP $code"
            if [ "$code" != "200" ]; then
              echo "::error::$BASE/ home page unreachable (got $code)"
              fail=1
              continue
            fi
            # Org copy rule: no standalone "AI" on a user-facing surface.
            if grep -Eq '\bAI\b' /tmp/home.html; then
              echo "::error::$BASE/ uses the banned word 'AI' (org copy rule)"
              fail=1
            fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::home-page copy verification failed"
            exit 1
          fi
          echo "✅ home page is publicly reachable and copy-clean (no banned 'AI')"

      - name: Verify tenant isolation on session reads (Phase 2 2/3)
        # Race-free proof: this runs in the SAME job right after the deploy above,
        # so the freshly-built code is guaranteed live on the pages.dev alias (no
        # "health 200 on the old build" ambiguity). Mints two authed identities in
        # different orgs, seeds an owner-held session, and asserts anon=401,
        # cross-tenant=403 (JSON + phone-stream), owner=200, then cleans up.
        env:
          BASE_URL: https://${{ env.CF_PROJECT }}.pages.dev
        run: node scripts/phase2-isolation-check.mjs

      - name: Verify security headers (Phase 2 3/3)
        # Assert the security-header set is present on the freshly-deployed build.
        # Targets a DYNAMIC document route (/) and an API route (/api/health) —
        # both rendered by the OpenNext worker, so next.config headers() attaches.
        # Checked on the pages.dev alias (authoritative for this deploy) AND the
        # branded domain (proves live users are protected). A missing header
        # fails the deploy — this is a permanent regression gate.
        run: |
          set -e
          fail=0
          # Header name (case-insensitive) + a substring its value MUST contain.
          check_header() {
            local hdrs="$1" name="$2" needle="$3" where="$4"
            local line
            line=$(printf '%s' "$hdrs" | grep -i "^$name:" | head -1 || true)
            if [ -z "$line" ]; then
              echo "::error::$where missing header $name"; fail=1; return
            fi
            if ! printf '%s' "$line" | grep -iq "$needle"; then
              echo "::error::$where $name present but missing '$needle' -> $line"; fail=1; return
            fi
            echo "  ✓ $name ($needle)"
          }
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            for path in / /api/health; do
              echo "== $BASE$path =="
              H=""
              for i in 1 2 3 4 5; do
                H=$(curl -sS -D - -o /dev/null "$BASE$path" || echo '')
                if printf '%s' "$H" | grep -iq '^content-security-policy:'; then break; fi
                sleep 6
              done
              check_header "$H" "content-security-policy"   "frame-ancestors 'none'"           "$BASE$path"
              check_header "$H" "strict-transport-security"  "max-age=31536000"                 "$BASE$path"
              check_header "$H" "x-content-type-options"     "nosniff"                          "$BASE$path"
              check_header "$H" "x-frame-options"            "DENY"                             "$BASE$path"
              check_header "$H" "referrer-policy"            "strict-origin-when-cross-origin"  "$BASE$path"
              # microphone=(self) MUST survive — browser voice mode depends on it.
              check_header "$H" "permissions-policy"         "microphone=(self)"                "$BASE$path"
            done
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Phase 2 (3/3) security-header verification failed"
            exit 1
          fi
          echo "✅ Security headers present on both hosts (document + API)"
