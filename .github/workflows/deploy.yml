name: Deploy to Cloudflare Pages (LWT)

# Phase 1(b): build via OpenNext and deploy a NEW Cloudflare Pages project in the
# LWT account, then verify on the *.pages.dev preview URL BEFORE any DNS cutover.
#
# - Auth uses the repo-staged CF_API_TOKEN / CF_ACCOUNT_ID (mapped onto the
#   CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID env vars wrangler reads).
# - Deploys to a fresh project name (xpelevator-sim) — the old xpelevator.pages.dev
#   lives in a different CF account and its subdomain is globally reserved.
# - The xpelevator.com CNAME flip is founder-gated and is NOT part of this workflow.
# - Runs on push to main (steady state) and manual dispatch. The job
#   self-verifies (/api/health 200 + live Groq credential) and fails loudly on a
#   bad deploy; it touches NO DNS, so auto-run on merge is safe.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-lwt
  cancel-in-progress: false

env:
  CF_PROJECT: xpelevator-sim
  CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build, deploy to LWT, verify

    env:
      # Injected at build time so src/lib/env.ts validation passes during the
      # OpenNext build. At RUNTIME the Pages Worker reads these from the
      # project secrets set below (surfaced into process.env by OpenNext).
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with OpenNext
        run: npx @opennextjs/cloudflare build

      - name: Bundle worker for Pages advanced mode
        run: node scripts/bundle-worker.js

      - name: Ensure Pages project exists (idempotent)
        run: |
          npx wrangler pages project create "$CF_PROJECT" \
            --production-branch=main \
            || echo "Project already exists — continuing."

      - name: Set Pages project secrets
        # printf '%s' (NOT echo) avoids the trailing-newline trap on secret values.
        run: |
          printf '%s' "$GROQ_API_KEY"  | npx wrangler pages secret put GROQ_API_KEY  --project-name="$CF_PROJECT"
          printf '%s' "$DATABASE_URL"  | npx wrangler pages secret put DATABASE_URL  --project-name="$CF_PROJECT"
          printf '%s' "$AUTH_SECRET"   | npx wrangler pages secret put AUTH_SECRET   --project-name="$CF_PROJECT"

      - name: Deploy to Cloudflare Pages (production branch)
        run: |
          npx wrangler pages deploy .open-next/assets \
            --project-name="$CF_PROJECT" \
            --branch=main

      - name: Verify /api/health on the pages.dev alias
        run: |
          set -e
          BASE="https://${CF_PROJECT}.pages.dev"
          echo "Verifying $BASE/api/health ..."
          code=000
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /tmp/health.json -w '%{http_code}' "$BASE/api/health" || echo 000)
            echo "attempt $i: HTTP $code"
            cat /tmp/health.json 2>/dev/null || true; echo
            if [ "$code" = "200" ]; then break; fi
            sleep 10
          done
          if [ "$code" != "200" ]; then
            echo "::error::/api/health did not return 200 (last=$code)"
            exit 1
          fi
          echo "✅ /api/health returned 200"

      - name: Verify Groq scoring credential is live (not expired)
        run: |
          set -e
          code=$(curl -s -o /tmp/groq.json -w '%{http_code}' \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            https://api.groq.com/openai/v1/models || echo 000)
          echo "Groq /v1/models -> HTTP $code"
          head -c 400 /tmp/groq.json 2>/dev/null; echo
          if [ "$code" != "200" ]; then
            echo "::error::Groq credential rejected (HTTP $code) — scoring would be down"
            exit 1
          fi
          echo "✅ Groq credential valid — scoring engine credential is live"

      - name: Verify Phase 2 read-auth + no hidden-hint leak
        # The scoring mechanic depends on trainees NEVER seeing a scenario's
        # hidden hints/persona/objective. Assert on the freshly-deployed build:
        #   1. /api/scenarios, /api/jobs, /api/criteria reject anonymous reads (401)
        #   2. an anonymous /api/scenarios body exposes no hidden mechanics
        # Checked on the pages.dev alias (authoritative for this deploy) and on
        # the branded domain (proves live trainees are protected).
        run: |
          set -e
          fail=0
          for BASE in "https://${CF_PROJECT}.pages.dev" "https://xpelevator.com"; do
            echo "== $BASE =="
            for path in /api/scenarios /api/jobs /api/criteria; do
              code=000
              for i in 1 2 3 4 5; do
                code=$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path" || echo 000)
                if [ "$code" = "401" ]; then break; fi
                sleep 6
              done
              echo "GET $path -> HTTP $code"
              if [ "$code" != "401" ]; then
                echo "::error::$BASE$path must require auth (got $code)"
                fail=1
              fi
            done
            # Hidden-hint leak guard on the anonymous scenarios payload.
            sc=$(curl -s "$BASE/api/scenarios" || echo '')
            if printf '%s' "$sc" | grep -Eiq '"hints"|customerObjective|customerPersona'; then
              echo "::error::$BASE/api/scenarios leaked hidden scenario mechanics"
              echo "  body (first 300 chars): $(printf '%s' "$sc" | head -c 300)"
              fail=1
            else
              echo "✅ $BASE/api/scenarios exposes no hidden mechanics to anonymous callers"
            fi
          done
          if [ "$fail" != "0" ]; then
            echo "::error::Phase 2 security verification failed"
            exit 1
          fi
          echo "✅ Phase 2 read-auth + hidden-hint-leak checks passed"

      - name: Verify tenant isolation on session reads (Phase 2 2/3)
        # Race-free proof: this runs in the SAME job right after the deploy above,
        # so the freshly-built code is guaranteed live on the pages.dev alias (no
        # "health 200 on the old build" ambiguity). Mints two authed identities in
        # different orgs, seeds an owner-held session, and asserts anon=401,
        # cross-tenant=403 (JSON + phone-stream), owner=200, then cleans up.
        env:
          BASE_URL: https://${{ env.CF_PROJECT }}.pages.dev
        run: node scripts/phase2-isolation-check.mjs
