version: 2
updates:
  # npm dependencies. Grouped so related upgrades land in one reviewable PR
  # rather than dozens. Majors are grouped separately because they can carry
  # breaking changes (e.g. wrangler 3→4, the vitest 4.0→4.1 harness change,
  # a Next 16 migration) that need their own verification.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major

  # Keep the GitHub Actions used by CI/deploy patched too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
